name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: [self-hosted, Linux, X64, synology, shell-only, private]
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node 22
        run: |
          set -euo pipefail
          NODE_VERSION=22.22.2
          NODE_DIR="$RUNNER_TEMP/node-$NODE_VERSION"
          mkdir -p "$NODE_DIR"
          curl -fsSL "https://github.com/actions/node-versions/releases/download/${NODE_VERSION}-23521889093/node-${NODE_VERSION}-linux-x64.tar.gz" |
            tar -xz --strip-components=1 --no-same-owner -C "$NODE_DIR"
          echo "$NODE_DIR/bin" >> "$GITHUB_PATH"

      - name: Show runner Node
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/pages-action@v1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'omt-assist-org' }}
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
