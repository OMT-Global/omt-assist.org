name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  lint-test-build:
    name: Lint, test, build
    runs-on: [self-hosted, Linux, X64, synology, shell-only, private]
    steps:
      - uses: actions/checkout@v4
      - name: Install Node 22
        run: |
          set -euo pipefail
          NODE_VERSION=22.22.2
          NODE_DIR="$RUNNER_TEMP/node-$NODE_VERSION"
          mkdir -p "$NODE_DIR"
          curl -fsSL "https://github.com/actions/node-versions/releases/download/${NODE_VERSION}-23521889093/node-${NODE_VERSION}-linux-x64.tar.gz" |
            tar -xz --strip-components=1 --no-same-owner -C "$NODE_DIR"
          echo "$NODE_DIR/bin" >> "$GITHUB_PATH"
      - name: Show runner Node
        run: |
          node --version
          npm --version
      - run: npm ci
      - run: npm run sync:data
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
