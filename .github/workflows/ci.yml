name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  lint-test-build:
    name: Lint, test, build
    runs-on: [self-hosted, Linux, X64, synology, shell-only, private]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run sync:data
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
