name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  lint-test-build:
    name: Lint, test, build
    runs-on: [self-hosted, Linux, X64, synology, shell-only, private]
    steps:
      - uses: actions/checkout@v4
      - name: Show runner Node
        run: |
          node --version
          npm --version
      - run: npm ci
      - run: npm run sync:data
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
